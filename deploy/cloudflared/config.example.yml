# SocketHR: Cloudflare Tunnel → local API (port 3000)
#
# Vercel DNS only (domain NOT on Cloudflare):
#   1. Copy to ~/.cloudflared/config.yml
#   2. Replace TUNNEL_UUID and credentials-file (see cloudflared tunnel list)
#   3. At Vercel DNS: CNAME "api" → TUNNEL_UUID.cfargotunnel.com
#   4. Run: cloudflared tunnel --config ~/.cloudflared/config.yml run
#
# Full steps: README.md in this folder.

tunnel: TUNNEL_UUID
credentials-file: /Users/YOUR_USER/.cloudflared/TUNNEL_UUID.json

ingress:
  - hostname: api.sockethr.com
    service: http://127.0.0.1:3000
  # Required catch-all (must be last)
  - service: http_status:404
