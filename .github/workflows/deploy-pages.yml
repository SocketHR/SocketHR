# Optional: deploy static site to GitHub Pages (not used for production — sockethr.com is on Vercel).
# Runs only when triggered manually so pushes to main do not start Pages builds.
# To use: 1) Settings → Pages → Source: GitHub Actions  2) Secrets → add VITE_SOCKETHR_API_BASE
# To fully turn off Pages: Settings → Pages → Source: None

name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SOCKETHR_API_BASE: ${{ secrets.VITE_SOCKETHR_API_BASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
